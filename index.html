<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SwiftDL — Video & Audio Downloader</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05101f;--bg2:#081428;--bg3:#0c1d38;--bg4:#102244;
  --blue:#1d6bfc;--blue2:#1558d6;--blue3:rgba(29,107,252,0.15);--blue4:rgba(29,107,252,0.30);
  --yellow:#f5c518;--yellow2:#d4a810;--yellow3:rgba(245,197,24,0.12);--yellow4:rgba(245,197,24,0.32);
  --surface:rgba(11,26,50,0.96);--surface2:rgba(16,34,68,0.92);
  --border:rgba(29,107,252,0.14);--border2:rgba(29,107,252,0.26);
  --text:#dde6f5;--text2:#7a9ac8;--text3:#3d5c8a;
  --green:#22c55e;--red:#f43f5e;
  --r:12px;--r2:9px;--r3:6px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow-x:hidden}
#root{min-height:100vh;position:relative}

/* ═══ BACKGROUND ART ════════════════════════════════════════════════════ */
#bg-art{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-glow{position:absolute;border-radius:50%;filter:blur(80px)}
.g1{width:500px;height:500px;background:rgba(29,107,252,0.09);top:-120px;left:-80px}
.g2{width:420px;height:420px;background:rgba(245,197,24,0.06);bottom:80px;right:-60px}
.g3{width:350px;height:350px;background:rgba(29,107,252,0.06);top:40%;left:45%}
/* Staff lines */
.staff{position:absolute;left:0;right:0;pointer-events:none;opacity:1}
/* Floating notes */
.fn{position:absolute;pointer-events:none;animation:floatnote linear infinite}
@keyframes floatnote{0%{transform:translateY(105vh) rotate(-8deg);opacity:0}8%{opacity:1}92%{opacity:1}100%{transform:translateY(-90px) rotate(12deg);opacity:0}}
/* EQ bars */
.eq-side{position:absolute;bottom:0;display:flex;align-items:flex-end;gap:4px;padding:0 14px}
.eqb{width:4px;border-radius:2px 2px 0 0;transform-origin:bottom;animation:eqpulse ease-in-out infinite}
@keyframes eqpulse{0%,100%{transform:scaleY(0.1)}50%{transform:scaleY(1)}}

/* ═══ LAYOUT ══════════════════════════════════════════════════════════════ */
#app{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:14px 14px 100px}

/* ═══ HEADER ══════════════════════════════════════════════════════════════ */
.hdr{display:flex;align-items:center;gap:14px;padding:18px 0 14px;border-bottom:1px solid var(--border)}
.logo{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--blue),var(--yellow));display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 0 22px rgba(29,107,252,0.35),0 0 14px rgba(245,197,24,0.2);flex-shrink:0}
.brand{font-size:22px;font-weight:900;letter-spacing:-0.5px}
.brand-sub{font-size:11px;color:var(--text3);margin-top:1px}
.heq{display:flex;align-items:flex-end;gap:3px;height:28px;margin-left:auto}
.hb{width:4px;border-radius:2px;transition:height .28s ease}

/* ═══ NAV ═════════════════════════════════════════════════════════════════ */
.nav{display:flex;gap:3px;background:var(--bg3);border-radius:var(--r);padding:4px;margin:14px 0;border:1px solid var(--border);flex-wrap:wrap}
.nb{flex:1;min-width:85px;padding:9px 10px;border:none;background:transparent;color:var(--text2);font-size:13px;font-weight:700;border-radius:var(--r2);cursor:pointer;transition:all .2s;text-align:center;font-family:inherit;white-space:nowrap}
.nb.on{background:var(--blue);color:#fff;box-shadow:0 0 16px rgba(29,107,252,0.4)}
.nb:hover:not(.on){background:var(--blue3);color:var(--text)}

/* ═══ CARDS ═══════════════════════════════════════════════════════════════ */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);backdrop-filter:blur(10px)}
.cp{padding:18px}
.gcard{border-color:var(--border2);box-shadow:0 0 18px rgba(29,107,252,0.07),0 4px 20px rgba(0,0,0,.35)}

/* ═══ INPUT ═══════════════════════════════════════════════════════════════ */
.inp{width:100%;padding:12px 16px;background:rgba(29,107,252,0.07);border:1px solid var(--border2);border-radius:var(--r2);color:var(--text);font-size:14px;outline:none;transition:all .2s;font-family:inherit}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,107,252,0.14);background:rgba(29,107,252,0.10)}
.inp::placeholder{color:var(--text3)}
textarea.inp{resize:vertical;min-height:92px;line-height:1.6}

/* ═══ BUTTONS ═════════════════════════════════════════════════════════════ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 18px;border-radius:var(--r2);font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:inherit;transition:all .18s;white-space:nowrap}
.btn:hover{background:var(--blue3);border-color:var(--border2)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;pointer-events:none}
.btn-blue{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 0 14px rgba(29,107,252,0.35)}
.btn-blue:hover{background:var(--blue2);box-shadow:0 0 22px rgba(29,107,252,0.5)}
.btn-yellow{background:var(--yellow);border-color:var(--yellow);color:#000;font-weight:800;box-shadow:0 0 14px rgba(245,197,24,0.3)}
.btn-yellow:hover{background:var(--yellow2);box-shadow:0 0 22px rgba(245,197,24,0.45)}
.btn-red{background:rgba(244,63,94,0.1);border-color:rgba(244,63,94,0.3);color:var(--red)}
.btn-red:hover{background:rgba(244,63,94,0.2)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:var(--r3)}
.btn-full{width:100%;padding:14px;font-size:15px}

/* ═══ QUALITY / FORMAT ════════════════════════════════════════════════════ */
.qgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:7px}
.qp{border:1px solid var(--border2);border-radius:var(--r2);padding:10px 6px;text-align:center;cursor:pointer;transition:all .18s;background:rgba(255,255,255,0.02)}
.qp:hover{border-color:var(--blue4);background:var(--blue3)}
.qp.on{border-color:var(--yellow);background:var(--yellow3);box-shadow:0 0 10px rgba(245,197,24,0.18)}
.ql{font-size:13px;font-weight:800;color:var(--text)}
.qp.on .ql{color:var(--yellow)}
.qs{font-size:10px;color:var(--text3);margin-top:2px}
.qp.on .qs{color:rgba(245,197,24,.65)}
.fpills{display:flex;flex-wrap:wrap;gap:7px}
.fp{padding:7px 16px;border-radius:99px;font-size:12px;font-weight:700;border:1px solid var(--border2);background:rgba(255,255,255,0.03);color:var(--text2);cursor:pointer;transition:all .18s;letter-spacing:.05em}
.fp:hover{color:var(--text);background:var(--blue3)}
.fp.on{background:var(--blue);border-color:var(--blue);color:#fff}
.fp.aud{background:var(--yellow3);border-color:var(--yellow4);color:var(--yellow2)}
.fp.aud.on{background:var(--yellow);border-color:var(--yellow);color:#000}

/* ═══ PLATFORM TABS ═══════════════════════════════════════════════════════ */
.ptabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.pt{display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:99px;font-size:12px;font-weight:700;border:1px solid var(--border2);background:rgba(255,255,255,0.03);color:var(--text2);cursor:pointer;transition:all .2s;user-select:none}
.pt:hover{color:var(--text);background:var(--blue3)}
.pt.on{border-color:transparent;color:#fff}
.pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ═══ VIDEO GRID ══════════════════════════════════════════════════════════ */
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.vc{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--surface);cursor:pointer;transition:all .2s;position:relative}
.vc:hover{border-color:var(--border2);box-shadow:0 0 18px rgba(29,107,252,0.2);transform:translateY(-2px)}
.vc-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:var(--bg3)}
.vc-ph{width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,var(--bg3),var(--bg4));display:flex;align-items:center;justify-content:center;font-size:30px;color:var(--text3)}
.vc-dur{position:absolute;bottom:44px;right:7px;background:rgba(0,0,0,.82);color:#fff;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:700}
.vc-dlbtn{position:absolute;top:6px;right:6px;width:28px;height:28px;border-radius:50%;background:var(--yellow);display:flex;align-items:center;justify-content:center;font-size:13px;opacity:0;transition:opacity .18s;cursor:pointer;box-shadow:0 0 10px rgba(245,197,24,.4)}
.vc:hover .vc-dlbtn{opacity:1}
.vc-body{padding:9px 11px}
.vc-title{font-size:12px;font-weight:600;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:30px}
.vc-meta{display:flex;justify-content:space-between;margin-top:5px;font-size:10px;color:var(--text3)}

/* ═══ DOWNLOAD ITEM ═══════════════════════════════════════════════════════ */
.dli{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px;margin-bottom:9px;transition:border-color .2s}
.dli.downloading{border-color:var(--border2)}
.dli.done{border-color:rgba(34,197,94,.22)}
.dli.error{border-color:rgba(244,63,94,.22)}
.pbar{height:5px;border-radius:3px;background:rgba(255,255,255,.07);overflow:hidden;margin:9px 0 6px}
.pfill{height:100%;border-radius:3px;transition:width .35s ease;position:relative;overflow:hidden}
.pfill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);animation:shim 1.6s infinite}
@keyframes shim{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

/* ═══ BADGES ══════════════════════════════════════════════════════════════ */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700}
.b-blue{background:var(--blue3);color:var(--blue);border:1px solid var(--blue4)}
.b-yellow{background:var(--yellow3);color:var(--yellow2);border:1px solid var(--yellow4)}
.b-green{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.25)}
.b-red{background:rgba(244,63,94,.1);color:var(--red);border:1px solid rgba(244,63,94,.25)}
.b-gray{background:rgba(255,255,255,.06);color:var(--text3);border:1px solid var(--border)}

/* ═══ MISC ════════════════════════════════════════════════════════════════ */
.sec-lbl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.divider{height:1px;background:var(--border);margin:14px 0}
.irow{display:flex;gap:7px;align-items:center;flex-wrap:wrap;font-size:12px;color:var(--text3)}
.dot3{width:3px;height:3px;border-radius:50%;background:var(--text3);flex-shrink:0}
.tprev{width:100%;height:195px;position:relative;overflow:hidden;border-radius:var(--r) var(--r) 0 0}
.tprev img{width:100%;height:100%;object-fit:cover}
.tover{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,.85))}
.tdur{position:absolute;bottom:10px;right:12px;background:rgba(0,0,0,.75);color:#fff;font-size:12px;padding:3px 8px;border-radius:4px;font-weight:700}
.tplat{position:absolute;top:10px;left:12px}
.tplay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:52px;height:52px;border-radius:50%;background:var(--yellow);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;box-shadow:0 0 24px rgba(245,197,24,.45);transition:transform .2s}
.tplay:hover{transform:translate(-50%,-50%) scale(1.1)}

/* ═══ STATUS BANNER ═══════════════════════════════════════════════════════ */
.status-banner{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-radius:var(--r2);font-size:13px;line-height:1.6;border:1px solid;margin-bottom:14px}
.sb-ok{background:rgba(34,197,94,.08);color:var(--green);border-color:rgba(34,197,94,.25)}
.sb-err{background:rgba(244,63,94,.08);color:var(--red);border-color:rgba(244,63,94,.25)}
.sb-warn{background:var(--yellow3);color:var(--yellow2);border-color:var(--yellow4)}
.sb-info{background:var(--blue3);color:var(--blue);border-color:var(--blue4)}

/* ═══ TOAST ═══════════════════════════════════════════════════════════════ */
.toast{position:fixed;bottom:24px;right:24px;z-index:9999;padding:12px 18px;border-radius:var(--r2);font-size:13px;font-weight:600;backdrop-filter:blur(14px);animation:tin .3s ease;max-width:360px;border:1px solid;box-shadow:0 4px 20px rgba(0,0,0,.4)}
@keyframes tin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.t-ok{background:rgba(34,197,94,.14);color:var(--green);border-color:rgba(34,197,94,.3)}
.t-err{background:rgba(244,63,94,.14);color:var(--red);border-color:rgba(244,63,94,.3)}
.t-info{background:var(--blue3);color:var(--blue);border-color:var(--blue4)}
.t-warn{background:var(--yellow3);color:var(--yellow2);border-color:var(--yellow4)}

/* ═══ SPINNER ═════════════════════════════════════════════════════════════ */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:34px;height:34px;border:3px solid var(--blue3);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
.pulse-t{color:var(--text2);font-size:13px;margin-top:10px;text-align:center;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* ═══ EMPTY ═══════════════════════════════════════════════════════════════ */
.empty{text-align:center;padding:50px 20px;color:var(--text3)}
.empty-ic{font-size:50px;margin-bottom:14px;opacity:.3}
.ei-t{font-size:16px;font-weight:700;color:var(--text2);margin-bottom:6px}
.ei-s{font-size:13px;line-height:1.7}

/* ═══ TOGGLE ══════════════════════════════════════════════════════════════ */
.tgl{width:44px;height:24px;border-radius:99px;background:rgba(255,255,255,.08);border:1px solid var(--border2);cursor:pointer;position:relative;transition:all .2s;flex-shrink:0}
.tgl.on{background:var(--blue);border-color:var(--blue)}
.tgl::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.tgl.on::after{left:23px}

/* ═══ SCROLLBAR ═══════════════════════════════════════════════════════════ */
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--blue4);border-radius:3px}
@media(max-width:600px){.vgrid{grid-template-columns:repeat(2,1fr)}.nb{font-size:11px;padding:8px 7px}}

/* ═══ DIAG ROW ════════════════════════════════════════════════════════════ */
.dr{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.dr:last-child{border:none}
</style>
</head>

<!-- Background art -->

  <div class="bg-glow g2"></div>
  <div class="bg-glow g3"></div>

  <!-- Music staff lines (blue, visible on dark blue bg) -->
  <svg class="staff" style="top:25%;height:50px;opacity:0.12" viewBox="0 0 1600 50" preserveAspectRatio="none">
    <line x1="0" y1="5"  x2="1600" y2="5"  stroke="#4d9fff" stroke-width="1"/>

  <svg class="staff" style="top:65%;height:50px;opacity:0.10" viewBox="0 0 1600 50" preserveAspectRatio="none">

    <line x1="107" y1="16" x2="107" y2="28" stroke="#f5c518" stroke-width="2.5"/>

  <!-- Guitar neck (blue) -->
  <svg style="position:absolute;left:-12px;bottom:100px;width:155px;opacity:0.14;transform:rotate(-12deg)" viewBox="0 0 80 420" fill="none">
    <rect x="28" y="0" width="24" height="420" rx="5" stroke="#4d9fff" stroke-width="2"/>

  <!-- Drum kit (yellow) -->
  <svg style="position:absolute;left:18px;top:50%;width:185px;opacity:0.11" viewBox="0 0 200 180" fill="none">

  <!-- Headphones (blue) -->

<script type="text/babel" data-presets="react">
const {useState,useEffect,useCallback,useRef} = React;

// ══════════════════════════════════════════════════════════════════════════════
//  CRITICAL: Safe fetch — NEVER throws JSON.parse errors
//  Always returns { data, error }. Never crashes.
// ══════════════════════════════════════════════════════════════════════════════
async function safeFetch(url, options = {}) {
  try {
    const res = await fetch(url, {
      ...options,
      headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
    });
    // Read raw text first — NEVER call res.json() directly
    const raw = await res.text();
    if (!raw || !raw.trim()) {
      return { data: null, error: res.ok ? 'Empty response from server.' : `Server error ${res.status}.` };
    }
    // Check if it looks like HTML (GitHub Pages 404, nginx error page, etc.)
    if (raw.trimStart().startsWith('<')) {
      if (res.status === 404) return { data: null, error: 'API endpoint not found (404). Is the backend server running?' };
      if (res.status === 502 || res.status === 503) return { data: null, error: 'Backend server is unavailable. Check that it is running.' };
      return { data: null, error: `Server returned HTML instead of JSON (status ${res.status}). The backend may not be running.` };
    }
    // Now safe to parse JSON
    let parsed;
    try { parsed = JSON.parse(raw); }
    catch(e) { return { data: null, error: 'Invalid JSON from server: ' + raw.slice(0, 120) }; }
    // Check for error field in response
    if (!res.ok || parsed.error) return { data: null, error: parsed.error || `HTTP ${res.status}` };
    return { data: parsed, error: null };
  } catch(e) {
    // Network error, CORS, server offline etc.
    if (e.message.includes('Failed to fetch') || e.message.includes('NetworkError') || e.message.includes('fetch')) {
      return { data: null, error: 'Cannot reach the backend server. Make sure server.js is running on port 4000 and you are accessing the app at http://localhost:4000 (not from GitHub Pages).' };
    }
    return { data: null, error: 'Network error: ' + e.message };
  }
}

// ══════════════════════════════════════════════════════════════════════════════
//  Platform config
// ══════════════════════════════════════════════════════════════════════════════
const PLATFORMS = [

  {id:'facebook',   label:'Facebook',   dot:'#1877F2',col:'#4d9fff',bg:'rgba(29,107,252,.14)',  short:'FB'},
  {id:'twitter',    label:'Twitter/X',  dot:'#1DA1F2',col:'#4dbfff',bg:'rgba(29,170,242,.14)',  short:'TW'},
  {id:'vimeo',      label:'Vimeo',      dot:'#1AB7EA',col:'#1ab7ea',bg:'rgba(26,183,234,.14)',  short:'VM'},

const VQUALITIES=[
  {label:'Best',      sub:'auto'},
  {label:'4K',        sub:'2160p ~2.8GB'},
  {label:'1080p',     sub:'FHD ~800MB'},
  {label:'720p',      sub:'HD ~350MB'},

  {label:'240p',      sub:'min ~40MB'},

const VFMTS=['mp4','mkv','webm','avi'];
const AFMTS=['mp3','aac','wav','flac','ogg','m4a'];

function getPlatCfg(n){
  if(!n)return PLATFORMS[PLATFORMS.length-1];
  const s=n.toLowerCase();
  return PLATFORMS.find(p=>s.includes(p.id)||s.includes(p.label.toLowerCase()))||PLATFORMS[PLATFORMS.length-1];
}

// ══════════════════════════════════════════════════════════════════════════════
//  Global toast
// ══════════════════════════════════════════════════════════════════════════════
let _toast=null;
function toast(msg,type='info',ms=4000){if(_toast)_toast(msg,type,ms);}
function Toast(){
  const [t,setT]=useState(null);
  _toast=useCallback((msg,type,ms)=>{setT({msg,type});setTimeout(()=>setT(null),ms);},[]);
  if(!t)return null;
  const cls={info:'t-info',ok:'t-ok',error:'t-err',warn:'t-warn'}[t.type]||'t-info';
  return <div className={`toast ${cls}`}>{t.msg}</div>;
}

function Spinner({label}){
  return <div style={{textAlign:'center',padding:'44px 20px'}}><div className="spinner"/>{label&&<div className="pulse-t">{label}</div>}</div>;
}

function Banner({type,children}){
  const cls={ok:'sb-ok',error:'sb-err',warn:'sb-warn',info:'sb-info'}[type]||'sb-info';
  const ic={ok:'✓',error:'✕',warn:'⚠',info:'ℹ'}[type]||'ℹ';
  return(
    <div className={`status-banner ${cls}`}>

}

//  Browse tab
// ══════════════════════════════════════════════════════════════════════════════
function BrowseTab({platform,onGoDownload}){
  const cfg=getPlatCfg(platform);
  const [query,setQuery]=useState('');
  const [results,setResults]=useState([]);
  const [loading,setLoading]=useState(false);
  const [trendLoading,setTrendLoading]=useState(false);
  const [err,setErr]=useState('');
  const [searched,setSearched]=useState(false);

  const [pasteUrl,setPasteUrl]=useState('');

  useEffect(()=>{setResults([]);setSearched(false);setErr('');setSelected(null);setPasteUrl('');if(platform!=='other')loadTrending();},[platform]);

  async function loadTrending(){
    setTrendLoading(true);setErr('');
    const {data,error}=await safeFetch(`/api/trending/${platform}`);
    if(error){setErr(error);}
    else{setResults(data.results||[]);if(!data.results?.length)setErr('No trending results. Try searching instead.');}

  async function doSearch(){

    setLoading(true);setErr('');setSearched(true);setSelected(null);
    const {data,error}=await safeFetch('/api/search',{method:'POST',body:JSON.stringify({query:query.trim(),platform,limit:24})});
    if(error){setErr(error);}
    else{setResults(data.results||[]);if(!data.results?.length)setErr('No results found. Try different keywords.');}

        <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
          <input className="inp" value={query} onChange={e=>setQuery(e.target.value)}

          <button className="btn btn-sm" title="Reload trending" onClick={()=>{setSearched(false);setQuery('');loadTrending();}}>⟳ Trending</button>

//  Download tab
// ══════════════════════════════════════════════════════════════════════════════
function DownloadTab({initUrl,onQueueAdd}){
  const [url,setUrl]=useState(initUrl||'');
  const [loading,setLoading]=useState(false);
  const [info,setInfo]=useState(null);
  const [err,setErr]=useState('');
  const [quality,setQuality]=useState('1080p');
  const [format,setFormat]=useState('mp4');
  const [mode,setMode]=useState('url');
  const [batch,setBatch]=useState('');
  const fmts=(quality==='Audio only'||AFMTS.includes(format))?AFMTS:[...VFMTS,...AFMTS];

  useEffect(()=>{if(initUrl){setUrl(initUrl);doAnalyze(initUrl);}else{setInfo(null);setErr('');}},[initUrl]);

  async function doAnalyze(u){
    const target=(u||url).trim();
    if(!target){setErr('Please paste a URL.');return;}
    setErr('');setInfo(null);setLoading(true);
    const {data,error}=await safeFetch('/api/info',{method:'POST',body:JSON.stringify({url:target})});
    if(error){setErr(error);}
    else{
      setInfo(data);
      if(data.availableHeights?.length){
        const h=data.availableHeights[0];
        setQuality(h>=2160?'4K':h>=1080?'1080p':h>=720?'720p':'480p');
      }
    }
    setLoading(false);
  }

  function selQ(q){setQuality(q);if(q==='Audio only'){if(!AFMTS.includes(format))setFormat('mp3');}else if(AFMTS.includes(format))setFormat('mp4');}
  function selF(f){setFormat(f);if(AFMTS.includes(f)){if(quality!=='Audio only')setQuality('Audio only');}else if(quality==='Audio only')setQuality('1080p');}

  function doDownload(autoStart=true){
    if(!info)return;
    const q=quality==='Audio only'?'Audio':quality;
    const f=(quality==='Audio only'&&!AFMTS.includes(format))?'mp3':format;
    onQueueAdd({url:info.url||url,title:info.title,platform:info.platform,quality:q,format:f,autoStart});
    toast(autoStart?`⬇ Download started!`:'➕ Added to queue',autoStart?'ok':'info');
  }

  function doBatch(){
    const lines=batch.split('\n').map(l=>l.trim()).filter(Boolean);
    if(!lines.length)return;
    const q=quality==='Audio only'?'Audio':quality;
    lines.forEach(u=>onQueueAdd({url:u,title:u.slice(0,60),platform:'Web',quality:q,format,autoStart:false}));
    toast(`✅ ${lines.length} URL(s) added to queue`,'ok');setBatch('');
  }

  return(
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        {[['url','🔗 Single URL'],['batch','📋 Batch URLs']].map(([m,l])=>(
          <button key={m} className={`btn btn-sm${mode===m?' btn-blue':''}`} onClick={()=>setMode(m)}>{l}</button>
        ))}
      </div>

      {mode==='url'&&(
        <div className="card cp gcard">
          <div className="sec-lbl">Paste any video URL</div>
          <div style={{display:'flex',gap:8,marginBottom:9}}>
            <input className="inp" value={url} onChange={e=>setUrl(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&doAnalyze()}
              placeholder="https://youtube.com/watch?v=...  or tiktok.com  or instagram.com  or vimeo.com…"
            />
            <button className="btn btn-blue" disabled={loading} onClick={()=>doAnalyze()}>{loading?'…':'🔍 Analyze'}</button>
          </div>
          <button className="btn" style={{width:'100%',borderStyle:'dashed',fontSize:12,color:'var(--text3)'}}
            onClick={()=>navigator.clipboard?.readText().then(t=>{if(t?.trim()){setUrl(t.trim());doAnalyze(t.trim());}}).catch(()=>toast('Clipboard access denied. Paste manually.','warn'))}>
            📋 Paste from clipboard &amp; analyze
          </button>
        </div>
      )}

      {mode==='batch'&&(
        <div className="card cp">
          <div className="sec-lbl">Batch — one URL per line</div>
          <textarea className="inp" value={batch} onChange={e=>setBatch(e.target.value)}
            placeholder={"https://www.youtube.com/watch?v=...\nhttps://www.tiktok.com/...\nhttps://vimeo.com/..."}
          />
          <button className="btn btn-yellow btn-full" style={{marginTop:10}} onClick={doBatch}>
            ➕ Add {batch.split('\n').filter(l=>l.trim()).length||0} URLs to Queue
          </button>
        </div>
      )}

      {loading&&<Spinner label="Fetching video info — please wait…"/>}

      {err&&(
        <Banner type="error">
          {err}
          {(err.includes('not running')||err.includes('localhost')||err.includes('backend'))&&(
            <div style={{marginTop:8,fontSize:12,lineHeight:1.7}}>
              <strong>Fix:</strong> Make sure the backend server is running.<br/>
              Open a terminal in the swiftdl folder and run: <code style={{background:'rgba(0,0,0,.3)',padding:'1px 6px',borderRadius:4}}>node server.js</code><br/>
              Then open the app at <strong>http://localhost:4000</strong> — not from GitHub Pages.
            </div>
          )}
        </Banner>
      )}

      {info&&!loading&&(
        <>
          <div className="card gcard" style={{overflow:'hidden'}}>
            {info.thumbnail&&(
              <div className="tprev">
                <img src={info.thumbnail} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                <div className="tover"/>
                <div className="tplat"><PlatBadge name={info.platform}/></div>
                {info.duration&&<div className="tdur">{info.duration}</div>}
              </div>
            )}
            <div className="cp" style={{paddingTop:info.thumbnail?14:18}}>
              {!info.thumbnail&&<div style={{marginBottom:8}}><PlatBadge name={info.platform}/></div>}
              <div style={{fontWeight:800,fontSize:15,lineHeight:1.4,marginBottom:8}}>{info.title}</div>
              <div className="irow">
                {info.uploader&&<span style={{color:'var(--yellow)',fontWeight:600}}>{info.uploader}</span>}
                {info.views&&<><div className="dot3"/><span>👁 {info.views}</span></>}
                {info.likes&&<><div className="dot3"/><span>♡ {info.likes}</span></>}
                {info.date&&<><div className="dot3"/><span>📅 {info.date}</span></>}
              </div>
            </div>
          </div>

          <div className="card cp">
            <div className="sec-lbl">Quality</div>
            <div className="qgrid">
              {VQUALITIES.map(q=>(
                <div key={q.label} className={`qp${quality===q.label?' on':''}`} onClick={()=>selQ(q.label)}>
                  <div className="ql">{q.label}</div><div className="qs">{q.sub}</div>
                </div>
              ))}
            </div>
          </div>

          <div className="card cp">
            <div className="sec-lbl">Format</div>
            <div className="fpills">
              {fmts.map(f=>(
                <div key={f} className={`fp${AFMTS.includes(f)?' aud':''}${format===f?' on':''}`} onClick={()=>selF(f)}>
                  {f.toUpperCase()}
                </div>
              ))}
            </div>
          </div>

          <div style={{display:'flex',gap:9,flexWrap:'wrap'}}>
            <button className="btn btn-blue btn-full" style={{flex:2,fontSize:15,padding:'14px'}} onClick={()=>doDownload(true)}>
              ⬇ Download — {format.toUpperCase()} · {quality}

            <button className="btn" style={{padding:'14px 13px'}} title="Copy URL" onClick={()=>{navigator.clipboard?.writeText(info.url||url);toast('URL copied!','info');}}>📋</button>
          </div>
        </>
      )}
    </div>
  );
}

//  Queue tab
// ══════════════════════════════════════════════════════════════════════════════
function QueueTab({queue,onClearDone,onStartAll,onCancel}){
  const dl=queue.filter(d=>d.status==='downloading').length;
  const qu=queue.filter(d=>d.status==='queued').length;
  const dn=queue.filter(d=>d.status==='done').length;
  const er=queue.filter(d=>d.status==='error').length;
  return(
    <div>
      {queue.length>0&&(
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:14}}>
          {[['⬇',dl,'Downloading','var(--blue)'],['⏳',qu,'Queued','var(--yellow)'],['✓',dn,'Done','var(--green)'],['✕',er,'Failed','var(--red)']].map(([ic,n,lb,col])=>(
            <div key={lb} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--r2)',padding:'10px',textAlign:'center'}}>
              <div style={{fontSize:18,fontWeight:900,color:n>0?col:'var(--text3)'}}>{ic} {n}</div>
              <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{lb}</div>
            </div>
          ))}
        </div>
      )}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}}>
        <span style={{fontSize:13,color:'var(--text2)'}}>{queue.length===0?'No downloads yet':`${queue.length} total`}</span>
        <div style={{display:'flex',gap:8}}>
          {qu>0&&<button className="btn btn-sm btn-blue" onClick={onStartAll}>▶ Start all ({qu})</button>}
          {dn>0&&<button className="btn btn-sm" onClick={onClearDone}>✕ Clear done</button>}
        </div>
      </div>
      {queue.length===0&&<div className="empty"><div className="empty-ic">📭</div><div className="ei-t">Queue is empty</div><div className="ei-s">Paste a URL in the Download tab or browse a platform<br/>and click ⬇ on any video.</div></div>}
      {queue.map(item=><DlItem key={item.id} item={item} onCancel={()=>onCancel(item.id)}/>)}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
//  Files tab
// ══════════════════════════════════════════════════════════════════════════════
function FilesTab(){
  const [files,setFiles]=useState([]);
  const [loading,setLoading]=useState(true);
  const [err,setErr]=useState('');

  async function load(){
    setLoading(true);setErr('');
    const {data,error}=await safeFetch('/api/downloads');
    if(error)setErr(error); else setFiles(data||[]);
    setLoading(false);
  }

  useEffect(()=>{load();},[]);

  async function del(name){
    if(!confirm(`Delete "${name}"?`))return;
    const {error}=await safeFetch(`/api/downloads/${encodeURIComponent(name)}`,{method:'DELETE'});
    if(error)toast('Delete failed: '+error,'error'); else{toast('Deleted','info');load();}
  }

  const ext=f=>f.split('.').pop().toLowerCase();
  const ic=f=>({mp4:'🎬',mkv:'🎬',webm:'🎬',avi:'🎬',mp3:'🎵',aac:'🎵',wav:'🎵',flac:'🎵',ogg:'🎵',m4a:'🎵'})[ext(f)]||'📄';
  const total=files.reduce((s,f)=>s+(f.bytes||0),0);
  const fmtB=b=>b>1e9?(b/1e9).toFixed(2)+' GB':b>1e6?(b/1e6).toFixed(1)+' MB':'0 B';

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:8}}>
        <div><span style={{fontWeight:700}}>{files.length} file{files.length!==1?'s':''}</span>{files.length>0&&<span style={{color:'var(--text3)',fontSize:12,marginLeft:8}}>· {fmtB(total)} total</span>}</div>
        <button className="btn btn-sm" onClick={load}>🔄 Refresh</button>
      </div>
      {err&&<Banner type="error">{err}</Banner>}
      {loading&&<Spinner label="Loading files…"/>}
      {!loading&&!err&&files.length===0&&<div className="empty"><div className="empty-ic">📂</div><div className="ei-t">No files yet</div><div className="ei-s">Downloaded files appear here</div></div>}
      {files.map(f=>(
        <div key={f.name} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--r2)',marginBottom:8}}>
          <span style={{fontSize:28,flexShrink:0,width:36,textAlign:'center'}}>{ic(f.name)}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.name}</div>
            <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{f.size} · {new Date(f.mtime).toLocaleDateString()}</div>
          </div>
          <div style={{display:'flex',gap:7,flexShrink:0}}>
            <a href={f.url} download className="btn btn-sm btn-yellow" style={{textDecoration:'none'}}>⬇ Save</a>
            <button className="btn btn-sm btn-red" onClick={()=>del(f.name)}>🗑</button>
          </div>
        </div>
      ))}
    </div>
  );
}

          <Row key={k} label={l} sub={s}><div className={`tgl${settings[k]?' on':''}`} onClick={()=>setSettings(p=>({...p,[k]:!p[k]}))}/></Row>
        ))}

      {/* Status check */}
      <div className="card cp">

          <div style={{marginTop:14}}>

            {!diag._error&&(

                    ['Node.js', diag.node, true],

// ══════════════════════════════════════════════════════════════════════════════
//  Root App
// ══════════════════════════════════════════════════════════════════════════════
function App(){
  const [tab,setTab]=useState('download');
  const [browseP,setBrowseP]=useState('youtube');
  const [queue,setQueue]=useState([]);
  const [dlInit,setDlInit]=useState({url:''});
  const [serverOk,setServerOk]=useState(null); // null=unchecked, true=ok, false=down
  const [settings,setSettings]=useState({
    defaultQuality:'1080p',defaultFormat:'mp4',concurrent:3,speedLimit:'Unlimited',
    embedSubtitles:true,saveThumbnail:false,notifications:true,autoMerge:true,
  });
  const activeN=queue.filter(d=>d.status==='downloading'||d.status==='queued').length;

  // Check server on mount
  useEffect(()=>{
    safeFetch('/api/status').then(({data,error})=>{
      setServerOk(!error && data?.ok);
    });
  },[]);

  function addToQueue({url,title,platform,quality,format,autoStart}){
    const id='j_'+Date.now()+'_'+Math.random().toString(36).slice(2,5);
    const item={id,url,title:title||url.slice(0,60),platform:platform||'Web',quality,format,
                status:autoStart?'downloading':'queued',progress:0,speed:'',eta:'',size:'',fileUrl:'',log:'',errorMsg:''};
    setQueue(q=>[...q,item]);
    if(autoStart){startDl(id,url,quality,format);setTab('queue');}
  }

  async function startDl(id,url,quality,format){
    const {data,error}=await safeFetch('/api/download',{method:'POST',body:JSON.stringify({url,quality,format})});
    if(error||!data?.jobId){
      setQueue(q=>q.map(item=>item.id===id?{...item,status:'error',errorMsg:error||'Failed to start download'}:item));
      return;
    }
    const es=new EventSource(`/api/progress/${data.jobId}`);
    es.onmessage=e=>{
      let msg;
      try{msg=JSON.parse(e.data);}catch{return;}
      setQueue(q=>q.map(item=>{
        if(item.id!==id)return item;
        if(msg.type==='progress')return{...item,progress:Math.min(99,Math.round(msg.percent||0)),speed:msg.speed||'',eta:msg.eta||''};
        if(msg.type==='done'){es.close();if(settings.notifications&&'Notification'in window&&Notification.permission==='granted')new Notification('SwiftDL ✓',{body:item.title});return{...item,status:'done',progress:100,speed:'',eta:'',size:msg.size||'',fileUrl:msg.url||''};}
        if(msg.type==='error'){es.close();return{...item,status:'error',errorMsg:msg.message};}
        if(msg.type==='info'||msg.type==='log')return{...item,log:(msg.message||'').slice(0,80)};
        return item;
      }));
    };
    es.onerror=()=>{es.close();setQueue(q=>q.map(item=>item.id===id&&item.status==='downloading'?{...item,status:'error',errorMsg:'Connection lost'}:item));};
  }

  function cancelDl(id){
    safeFetch(`/api/cancel/${id}`,{method:'POST'}).catch(()=>{});
    setQueue(q=>q.filter(d=>d.id!==id));
    toast('Cancelled','info');
  }

  useEffect(()=>{if('Notification'in window&&Notification.permission==='default')Notification.requestPermission();},[]);

  const NAVS=[
    {id:'download',label:'⬇ Download'},
    {id:'browse',  label:'🌐 Browse'},
    {id:'queue',   label:`⏳ Queue${activeN>0?` (${activeN})`:''}` },
    {id:'files',   label:'📁 Files'},
    {id:'settings',label:'⚙ Settings'},
  ];

  return(
    <div id="app">
      {/* Header */}
      <div className="hdr">
        <div className="logo">🎵</div>
        <div>
          <div className="brand"><span style={{color:'var(--blue)'}}>Swift</span><span style={{color:'var(--yellow)'}}>DL</span></div>
          <div className="brand-sub">Video &amp; Audio Downloader · yt-dlp powered</div>
        </div>
        <HeadEQ/>
      </div>

      {/* Server status bar */}
      {serverOk===false&&(
        <div style={{marginTop:12}}>
          <Banner type="error">
            Backend server not detected. <strong>The app needs a Node.js backend to work.</strong><br/>
            Run <code style={{background:'rgba(0,0,0,.3)',padding:'1px 6px',borderRadius:4}}>node server.js</code> in the swiftdl folder, then open <strong>http://localhost:4000</strong> in your browser.{' '}
            <button className="btn btn-sm" style={{marginLeft:8,padding:'3px 10px',fontSize:11}} onClick={()=>safeFetch('/api/status').then(({data,error})=>setServerOk(!error&&data?.ok))}>Retry</button>
          </Banner>
        </div>
      )}

      {/* Nav */}
      <div className="nav">
        {NAVS.map(n=><button key={n.id} className={`nb${tab===n.id?' on':''}`} onClick={()=>setTab(n.id)}>{n.label}</button>)}
      </div>

      {tab==='download'&&<DownloadTab key={dlInit.url||'empty'} initUrl={dlInit.url} onQueueAdd={addToQueue}/>}

      {tab==='browse'&&(
        <div>
          <div className="ptabs">
            {PLATFORMS.map(p=>(
              <div key={p.id} className={`pt${browseP===p.id?' on':''}`}
                onClick={()=>setBrowseP(p.id)}
                style={browseP===p.id?{background:`linear-gradient(135deg,${p.col}cc,${p.col}88)`}:{}}
              >
                <span className="pdot" style={{background:p.dot}}/>{p.label}
              </div>
            ))}
          </div>
          <BrowseTab platform={browseP} onGoDownload={(url,title)=>{setDlInit({url});setTab('download');}}/>
        </div>
      )}

      {tab==='queue'&&(
        <QueueTab queue={queue}
          onClearDone={()=>setQueue(q=>q.filter(d=>d.status!=='done'))}
          onStartAll={()=>setQueue(q=>q.map(item=>{if(item.status==='queued'){startDl(item.id,item.url,item.quality,item.format);return{...item,status:'downloading'};}return item;}))}
          onCancel={cancelDl}
        />
      )}

      {tab==='files'&&<FilesTab/>}
      {tab==='settings'&&<SettingsTab settings={settings} setSettings={setSettings}/>}

      <Toast/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
